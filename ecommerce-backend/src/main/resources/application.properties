spring.application.name=ecommerce-backend
server.port=8081

# Load .env file from root explicitly as properties
spring.config.import=optional:file:../.env[.properties]

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=ERROR

logging.level.root=INFO
logging.level.com.murat.ecommerce.backend=INFO

# Iyzico Sandbox Configuration
iyzico.api.key=${IYZICO_API_KEY}
iyzico.secret.key=${IYZICO_SECRET_KEY}
iyzico.base.url=${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}

# SMTP Configuration (Fake SMTP Server)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT Configuration
jwt.secret=${JWT_SECRET:CHANGE_ME_TO_A_LONG_RANDOM_SECRET_KEY_AT_LEAST_32_CHARS}
